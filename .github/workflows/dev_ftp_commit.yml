on:  push
name:  Deploy Dev Code on pus
jobs:  
  web-deploy:  
    name: Deploy
    runs-on: ubuntu-latest
    steps: 
    -   name: Sync Files
        # You may pin to the exact commit or the version.
        # uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: hrdcsaqa.net # ftp server
          username: # ftp username
          password: # ftp password
          protocol: ftp # (optional) protocol to deploy with - ftp, ftps, or ftps-legacy
          server-dir: test-push-ftp/ # optional
